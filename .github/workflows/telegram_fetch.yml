name: Telegram Fetcher

on:
  schedule:
    - cron: "0 */4 * * *"   # اجرای هر ۴ ساعت
  workflow_dispatch:        # اجرای دستی

permissions:
  contents: write           # اجازه Push به ریپازیتوری

jobs:
  fetch-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install telethon python-dateutil

      - name: Run fetch_posts.py
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        run: |
          python fetch_posts.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"
          git add -A
          git commit -m "Auto-update posts [$(date)]" || echo "No changes to commit"
          git push
